<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BF Compiler App</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #00e676;
            --text: #e0e0e0;
            --danger: #ff5252;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            color: var(--accent);
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 0;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        textarea, input {
            width: 100%;
            background: #2c2c2c;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            font-size: 16px; /* Verhindert Auto-Zoom auf iPhones */
        }

        textarea { height: 120px; resize: none; }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .btn-run { background: var(--accent); color: #000; }
        .btn-clear { background: #333; color: var(--danger); }

        .output-area {
            min-height: 40px;
            background: #000;
            padding: 10px;
            border-radius: 6px;
            color: var(--accent);
            font-family: monospace;
            word-break: break-all;
        }

        .tape-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 10px 0;
        }

        .cell {
            min-width: 40px;
            height: 40px;
            background: #2c2c2c;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 1px solid #444;
        }

        .cell.active {
            border: 2px solid var(--accent);
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent);
        }

        /* Versteckt Scrollbar für Clean Look */
        .tape-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>BF_STUDIO</h1>
    </header>

    <div class="card">
        <label>Code</label>
        <textarea id="code" placeholder="Brainfuck Code hier...">++++++++++[>+++++++>**********>+++>+<<<<-]>++.>+.+++++++..+++.>++.<<+++++++++++++++.>.+++.------.--------.>+.>.</textarea>
    </div>

    <div class="card">
        <label>Input (für ,)</label>
        <input type="text" id="inputBuffer" placeholder="Eingabedaten...">
    </div>

    <div class="btn-group">
        <button class="btn-run" onclick="runBF()">START</button>
        <button class="btn-clear" onclick="clearAll()">LÖSCHEN</button>
    </div>

    <div class="card">
        <label>Output</label>
        <div id="output" class="output-area">Bereit...</div>
    </div>

    <div class="card">
        <label>Speicher-Band</label>
        <div id="tape" class="tape-container"></div>
    </div>
</div>

<script>
    function runBF() {
        const code = document.getElementById('code').value.replace(/[^><\+\-\.,\[\]]/g, '');
        const inputStr = document.getElementById('inputBuffer').value;
        const outputDiv = document.getElementById('output');
        
        let tape = new Uint8Array(30000);
        let dp = 0;
        let pc = 0;
        let inputPtr = 0;
        let output = "";
        
        // Jump Table
        let jumps = {};
        let stack = [];
        for (let i = 0; i < code.length; i++) {
            if (code[i] === '[') stack.push(i);
            else if (code[i] === ']') {
                let start = stack.pop();
                jumps[start] = i;
                jumps[i] = start;
            }
        }

        let maxOps = 500000;
        while (pc < code.length && maxOps > 0) {
            let char = code[pc];
            switch (char) {
                case '>': dp++; break;
                case '<': dp--; break;
                case '+': tape[dp]++; break;
                case '-': tape[dp]--; break;
                case '.': output += String.fromCharCode(tape[dp]); break;
                case ',': 
                    tape[dp] = inputPtr < inputStr.length ? inputStr.charCodeAt(inputPtr++) : 0;
                    break;
                case '[': if (tape[dp] === 0) pc = jumps[pc]; break;
                case ']': if (tape[dp] !== 0) pc = jumps[pc]; break;
            }
            pc++;
            maxOps--;
        }

        outputDiv.innerText = output || "Keine Ausgabe";
        updateTape(tape, dp);
    }

    function updateTape(tape, currentPtr) {
        const tapeDiv = document.getElementById('tape');
        tapeDiv.innerHTML = '';
        // Zeige die Zellen um den aktuellen Pointer herum
        let start = Math.max(0, currentPtr - 2);
        for (let i = start; i < start + 10; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell' + (i === currentPtr ? ' active' : '');
            cell.innerText = tape[i] || 0;
            tapeDiv.appendChild(cell);
        }
    }

    function clearAll() {
        document.getElementById('code').value = '';
        document.getElementById('inputBuffer').value = '';
        document.getElementById('output').innerText = 'Bereit...';
        updateTape(new Uint8Array(30000), 0);
    }

    updateTape(new Uint8Array(30000), 0);
</script>

</body>
</html>
